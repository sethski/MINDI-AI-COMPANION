name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "services/agent[dev]"

      - name: Run agent tests
        run: python -m pytest services/agent/tests -v --tb=short

      - name: Install AI runtime dependencies
        # transformers[torch] is large; install separately after agent tests
        run: python -m pip install -e "services/ai_runtime[dev]"

      - name: Run AI runtime contract tests
        run: python -m pytest services/ai_runtime/tests -v --tb=short

      - name: Typecheck desktop frontend
        run: pnpm --dir apps/desktop build

  test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "services/agent[dev]"

      - name: Run agent tests
        run: python -m pytest services/agent/tests -v --tb=short

      - name: Install AI runtime dependencies
        run: python -m pip install -e "services/ai_runtime[dev]"

      - name: Run AI runtime contract tests
        run: python -m pytest services/ai_runtime/tests -v --tb=short

      - name: Typecheck desktop frontend
        run: pnpm --dir apps/desktop build
